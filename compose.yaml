services:
  db:
    image: postgres:16-alpine
    container_name: auth_app_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: auth_app
      POSTGRES_PASSWORD: auth_app
      POSTGRES_DB: auth_app
    ports:
      - "5432:5432"
    volumes:
      - auth_app_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_app -d auth_app"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  auth_app_postgres:
